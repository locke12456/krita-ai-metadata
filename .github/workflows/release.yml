name: Release Krita Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: krita_ai_metadata.zip